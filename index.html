<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPixel Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A1628;
            color: #E8F0FE;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(180deg, #0F2040 0%, #0A1628 100%);
        }
        .logo-text {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .logo-fin { color: #FFFFFF; }
        .logo-pixel { color: #1A5CFF; }
        .tagline {
            margin-top: 12px;
            font-size: 1.1rem;
            color: #64748B;
            font-weight: 400;
        }
        main {
            max-width: 700px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #FFFFFF;
        }
        .games-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 48px;
        }
        .game-card {
            background: #111E33;
            border: 1px solid #1A2A44;
            border-radius: 12px;
            padding: 32px 24px;
            width: 280px;
            transition: border-color 0.2s;
        }
        .game-card:hover { border-color: #1A5CFF; }
        .game-card h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #FFFFFF;
        }
        .game-card p {
            font-size: 0.9rem;
            color: #64748B;
            line-height: 1.5;
        }
        .badge {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #1A5CFF22;
            color: #1A5CFF;
        }
        .contact {
            margin-top: 32px;
            padding: 24px;
            background: #111E33;
            border-radius: 12px;
            border: 1px solid #1A2A44;
        }
        .contact a {
            color: #1A5CFF;
            text-decoration: none;
        }
        .contact a:hover { text-decoration: underline; }
        footer {
            margin-top: auto;
            padding: 32px 20px;
            text-align: center;
            font-size: 0.85rem;
            color: #64748B;
            width: 100%;
            border-top: 1px solid #1A2A44;
        }
        footer a {
            color: #64748B;
            text-decoration: none;
            margin: 0 12px;
        }
        footer a:hover { color: #B8D4FF; }
        .footer-links { margin-bottom: 12px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-text">
            <span class="logo-fin">Fin</span><span class="logo-pixel">Pixel</span>
        </div>
        <p class="tagline">Games & Digital Tools from Finland</p>
    </header>

    <main>
        <h2 class="section-title">Our Games</h2>
        <div class="games-grid">
            <div class="game-card">
                <h3>Beyond Orbit</h3>
                <p>Explore a procedurally generated universe. Trade, fight, and survive in deep space.</p>
                <span class="badge">Coming Soon</span>
            </div>
        </div>

        <div class="contact">
            <h2 class="section-title">Contact</h2>
            <p><a href="mailto:finpixelgames@gmail.com">finpixelgames@gmail.com</a></p>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="/privacy-policy.html">Privacy Policy</a>
            <a href="/terms-of-service.html">Terms of Service</a>
        </div>
        <p>&copy; 2026 FinPixel Games. All rights reserved.</p>
    </footer>
</body>
</html>
